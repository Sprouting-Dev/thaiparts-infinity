# ───────────────────────────────────────────────────────────────────
# Decap CMS — Thai Parts Infinity
# โฮสต์: Cloudflare Pages | Login: GitHub OAuth (ลูกค้าต้องเป็น collaborator ของ repo)
#
# OAuth proxy = Cloudflare Pages Functions (functions/oauth/*) บนเว็บนี้เอง
# ต้องตั้ง env บน Cloudflare: OAUTH_GITHUB_CLIENT_ID, OAUTH_GITHUB_CLIENT_SECRET
#
# หมายเหตุ: รอบแรกเปิดให้แก้ "สินค้า (Products)" ก่อน — Articles / ข้อความหน้าเว็บ
#           จะทยอยเพิ่มเมื่อ wire โครงสร้างเสร็จ (Services แก้ผ่านเดฟ)
# ───────────────────────────────────────────────────────────────────

backend:
  name: github
  repo: Sprouting-Dev/thaiparts-infinity
  branch: main
  base_url: https://thaipartsinfinity.com
  auth_endpoint: oauth

media_folder: "public/uploads"   # ที่เก็บรูปจริงใน repo (รูปอัปใหม่ commit ที่นี่)
public_folder: "/uploads"        # path ที่เว็บใช้อ้างรูป

locale: "en"
publish_mode: simple

collections:
  # ── สินค้า ─────────────────────────────────────────────
  - name: products
    label: "สินค้า (Products)"
    label_singular: "สินค้า"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{title}}"
    fields:
      - { name: title, label: "ชื่อสินค้า", widget: string }
      - { name: slug, label: "Slug (URL)", widget: string, hint: "อังกฤษพิมพ์เล็ก คั่นด้วยขีด เช่น bearing-roller" }
      - { name: main_title, label: "หัวข้อหลัก (แสดงในหน้าสินค้า)", widget: string, required: false }
      - { name: tag, label: "แท็ก/หมวด", widget: string, required: false, hint: "เช่น Mechanical & Power Transmission Systems" }
      - { name: image, label: "รูปสินค้า", widget: image, required: false, choose_url: true }
      - { name: description, label: "รายละเอียด (HTML)", widget: text, required: false, hint: "รองรับ HTML — ตารางสเปกเป็น HTML" }
      - { name: category, label: "category (ไม่บังคับ)", widget: string, required: false, default: "" }
      - { name: order, label: "ลำดับการแสดง", widget: number, required: false, value_type: int, hint: "เลขน้อย = แสดงก่อน" }
